{% load static %}
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Discord{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'chat/css/style.css' %}">
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% if user.is_authenticated and user.is_active %}
    <script>
        window.__chatContext = window.__chatContext || {
            username: "{{ user.username|escapejs }}",
            channelId: null,
            dmUserId: null
        };
        window.__notificationMarkReadUrl = function (id) {
            return "{% url 'chat:notification_mark_read' pk=888888888 %}".replace("888888888", String(id));
        };
    </script>
    <script src="{% static 'chat/js/presence.js' %}"></script>
    <script src="{% static 'chat/js/notifications.js' %}"></script>
    {% endif %}
    {% block extra_js %}{% endblock %}
</body>
</html>
