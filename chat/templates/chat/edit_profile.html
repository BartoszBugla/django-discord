{% extends 'chat/base.html' %}
{% block title %}Edytuj profil - Django Discord{% endblock %}

{% block content %}
<div class="app-container">
    {% include 'chat/sidebar.html' %}

    <div class="main-content">
        <div class="top-bar">
            <h5><i class="bi bi-pencil"></i> Edytuj profil</h5>
        </div>

        <div class="content-area p-4">
            <div class="card p-4" style="max-width: 500px; margin: 0 auto;">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Avatar</label>
                        {{ form.avatar }}
                        {% if request.user.profile.avatar %}
                        <div class="mt-2">
                            <img src="{{ request.user.profile.avatar.url }}" class="avatar-small">
                            <span class="small text-muted ms-2">Obecny avatar</span>
                        </div>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Opis</label>
                        <textarea name="opis" class="form-control" rows="3">{{ form.opis.value|default:'' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                    <a href="{% url 'chat:profile' user_id=request.user.id %}" class="btn btn-secondary ms-2">Anuluj</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
